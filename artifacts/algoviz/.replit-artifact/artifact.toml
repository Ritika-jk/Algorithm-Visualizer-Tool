kind = "web"
previewPath = "/"
title = "AlgoViz - Algorithm Visualizer"
version = "1.0.0"
id = "artifacts/algoviz"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20311

[services.development]
run = "pnpm --filter @workspace/algoviz run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/algoviz", "run", "build" ]
publicDir = "artifacts/algoviz/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20311"
BASE_PATH = "/"
